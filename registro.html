<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - SmartBite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="registro-page">

   
    <nav class="navbar navbar-expand-lg fixed-top custom-navbar">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="inicio.html">
                <div class="logo-circle me-2">
                    <span class="text-white fw-bold">SB</span>
                </div>
                <div class="brand-text">
                    <span class="d-block h4 mb-0 fw-bold">SmartBite</span>
                    <small class="d-block text-white" style="font-size: 0.6rem;">Proyecto Saludable</small>
                </div>
            </a>

            <button class="navbar-toggler border-0 shadow-none" type="button"
                data-bs-toggle="collapse" data-bs-target="#navSmartBite">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navSmartBite">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 text-center">
                    <li class="nav-item"><a class="nav-link" href="inicio.html">INICIO</a></li>
                    <li class="nav-item"><a class="nav-link" href="inicio.html#nosotros">NOSOTROS</a></li>
                    <li class="nav-item"><a class="nav-link" href="inicio.html#contacto">CONTACTO</a></li>
                </ul>
                <div class="d-flex justify-content-center gap-3 align-items-center">
                    <a href="#" class="text-white h4 mb-0"><i class="bi bi-search"></i></a>
                    <a href="registro.html" class="text-white h4 mb-0"><i class="bi bi-person-circle"></i></a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-5 pt-5">
        <h2>Registro de Usuario</h2>
        <p>Completa los datos:</p>

        <form>
            <div class="campo">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" required>
            </div>

            <div class="campo">
                <label for="apellido">Apellidos:</label>
                <input type="text" id="apellido" required>
            </div>

            <div class="campo">
                <label for="fecha">Fecha de nacimiento:</label>
                <input type="date" id="fecha" required>
            </div>

            <div class="campo">
                <label for="telefono">Teléfono:</label>
                <input type="tel" id="telefono" required>
            </div>

            <div class="campo">
                <label for="correo">Correo:</label>
                <input type="email" id="correo" required>
            </div>

            <div class="campo">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" required>
            </div>

            <div class="campo">
                <label for="confirmar">Confirmar contraseña:</label>
                <input type="password" id="confirmar" required>
            </div>

            <div class="campo d-flex align-items-center gap-2">
                <input type="checkbox" id="notificaciones">
                <label for="notificaciones" class="mb-0">Recibir notificaciones</label>
            </div>

            <div class="botones mt-3">
                <button type="submit">Registrarse</button>
                <button type="reset">Limpiar</button>
            </div>
        </form>
    </main>

<footer class="footer-custom mt-auto py-4">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
            <div class="fw-bold h5 mb-0">© SmartBite 2026</div>
            <div class="text-center text-md-end mt-3 mt-md-0">
                <p class="mb-1 fw-bold">Síguenos</p>
                <div class="h4 mb-0 d-flex gap-3 justify-content-center">
                    <i class="bi bi-facebook"></i>
                    <i class="bi bi-instagram"></i>
                </div>
            </div>
        </div>
        
    </footer>
<!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    
</body>
</html>
